<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat - Perumdam Amerta Toraya</title>
    <style>
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 50px; }
        .navbar { display: flex; justify-content: space-around; background: #5d87ff; padding: 12px 0; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 13px; opacity: 0.7; }
        .navbar a.active { opacity: 1; border-bottom: 2px solid #fff; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .btn-print { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .report-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; }
        
        @media print {
            @page { size: A4; margin: 10mm; }
            .navbar, .btn-print, #f-date, #history-list { display: none !important; }
            #print-area { display: block !important; }
            .page-container { page-break-after: always; min-height: 275mm; position: relative; }
            .print-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
            .job-box { border: 1px solid #000; margin-bottom: 8px; page-break-inside: avoid; }
            .job-head { background: #eee !important; padding: 4px 8px; font-weight: bold; font-size: 10px; border-bottom: 1px solid #000; }
            .job-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid #000; }
            .job-col { border-right: 1px solid #000; padding: 3px; text-align: center; }
            .job-img { width: 55mm; height: 45mm; object-fit: contain; }
            .job-desc { padding: 5px 8px; font-size: 10px; }
        }
        #print-area { display: none; }
    </style>
</head>
<body>

<nav class="navbar"><a href="index.html">📝 Input Laporan</a><a href="tampildata.html" class="active">📂 Riwayat</a></nav>

<div class="container">
    <input type="date" id="f-date" onchange="updateUI()" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc;">
    <button class="btn-print" id="print-btn" onclick="window.print()" disabled>🖨️ Cetak Laporan Terpilih (0)</button>
    <div id="history-list" style="margin-top:15px;"></div>
</div>

<div id="print-area"></div>

<script>
    function updateUI() {
        const fd = document.getElementById('f-date').value;
        let data = JSON.parse(localStorage.getItem('lapdok_history') || '[]');
        if(fd) data = data.filter(h => h.timestamp === fd);

        const list = document.getElementById('history-list');
        list.innerHTML = data.reverse().map(h => `
            <div class="report-card">
                <input type="checkbox" class="cb" value="${h.id}" onchange="updateBtn()">
                <div style="flex-grow:1; margin-left:15px; cursor:pointer;" onclick="restoreToEditor(${h.id})">
                    <div style="font-weight:bold;">📅 ${h.timestamp} (${h.data.length} Item)</div>
                    <div style="font-size:9px; color:#5d87ff;">Klik untuk mengedit data ini</div>
                </div>
                <button onclick="deleteItem(event, ${h.id})" style="background:#e74c3c; color:white; border:none; padding:8px; border-radius:4px; font-size:10px; cursor:pointer;">Hapus</button>
            </div>`).join('');
        updateBtn();
    }

    function restoreToEditor(id) {
        const all = JSON.parse(localStorage.getItem('lapdok_history') || '[]');
        const entry = all.find(h => h.id === id);
        if(entry) {
            localStorage.setItem('lapdok_draft', JSON.stringify(entry.data));
            localStorage.setItem('lapdok_edit_context', id);
            window.location.href = "index.html";
        }
    }

    function updateBtn() {
        const count = document.querySelectorAll('.cb:checked').length;
        document.getElementById('print-btn').disabled = count === 0;
        document.getElementById('print-btn').innerText = `🖨️ Cetak Laporan Terpilih (${count})`;
        generatePrintArea();
    }

    function generatePrintArea() {
        const ids = Array.from(document.querySelectorAll('.cb:checked')).map(c => parseFloat(c.value));
        const all = JSON.parse(localStorage.getItem('lapdok_history') || '[]');
        const target = document.getElementById('print-area'); target.innerHTML = '';
        let items = [];
        all.filter(h => ids.includes(h.id)).forEach(h => h.data.forEach(d => items.push(d)));

        const perPage = 3; const totalP = Math.ceil(items.length / perPage);
        for(let i=0; i < items.length; i+=perPage) {
            const page = document.createElement('div'); page.className = 'page-container';
            const chunk = items.slice(i, i+perPage);
            let html = `<div class="print-header"><h2 style="margin:0;">DOKUMENTASI LAPORAN KINERJA HARIAN</h2></div>`;
            html += chunk.map((it, idx) => `
                <div class="job-box">
                    <div class="job-head">ITEM #${i+idx+1} | TANGGAL: ${it.workDate}</div>
                    <div class="job-grid">
                        ${[it.p1, it.p2, it.p3].map((s,p) => `
                        <div class="job-col"><div style="font-size:7px; font-weight:bold;">${p==0?'SEBELUM':p==1?'PROSES':'SESUDAH'}</div>
                        ${s?`<img class="job-img" src="${s}">`:'-'}</div>`).join('')}
                    </div>
                    <div class="job-desc"><strong>INDIKATOR:</strong> ${it.indikator}<br><strong>KET:</strong> ${it.desc}</div>
                </div>`).join('');
            html += `<div style="position:absolute; bottom:5px; right:0; font-size:9px;">Halaman ${Math.floor(i/3)+1} dari ${totalP}</div>`;
            page.innerHTML = html; target.appendChild(page);
        }
    }

    function deleteItem(e, id) {
        e.stopPropagation();
        if(confirm("Hapus data riwayat ini permanen?")) {
            let h = JSON.parse(localStorage.getItem('lapdok_history'));
            localStorage.setItem('lapdok_history', JSON.stringify(h.filter(x => x.id !== id)));
            updateUI();
        }
    }
    window.onload = updateUI;
</script>
</body>
</html>
